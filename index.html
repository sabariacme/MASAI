<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Fridge Hero - AI Recipe Generator</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700&family=Playfair+Display:wght@700&display=swap" rel="stylesheet">
  <style>
    :root {
      --primary: #F25C05;
      --primary-hover: #E85D04;
      --secondary: #FFB703;
      --secondary-soft: #FFF3D6;
      --bg-gradient: linear-gradient(135deg, #FFFDF9 0%, #FFF3E8 50%, #FFE9D6 100%);
      --card-bg: #FFFFFF;
      --text-main: #2C1A11;
      --text-muted: #7A685D;
      --input-bg: #FAF6F0;
      --border-color: #EFE6DC;
      --shadow: 0 20px 40px rgba(226, 94, 26, 0.08), 0 4px 12px rgba(0, 0, 0, 0.03);
      --radius: 24px;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      font-family: 'Outfit', -apple-system, BlinkMacSystemFont, sans-serif;
    }

    body {
      background: var(--bg-gradient);
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 24px 16px;
      color: var(--text-main);
    }

    .app-card {
      background: var(--card-bg);
      max-width: 500px;
      width: 100%;
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      padding: 36px 28px;
      border: 1px solid rgba(255, 235, 215, 0.8);
      position: relative;
      overflow: hidden;
    }

    .app-card::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      height: 6px;
      background: linear-gradient(90deg, var(--secondary), var(--primary));
    }

    .header {
      text-align: center;
      margin-bottom: 28px;
    }

    .header-badge {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 56px;
      height: 56px;
      background: var(--secondary-soft);
      border-radius: 50%;
      font-size: 28px;
      margin-bottom: 12px;
      box-shadow: inset 0 2px 4px rgba(255, 183, 3, 0.2);
    }

    .header h1 {
      font-family: 'Playfair Display', Georgia, serif;
      font-size: 32px;
      font-weight: 700;
      color: var(--text-main);
      letter-spacing: -0.5px;
    }

    .header p {
      font-size: 14px;
      color: var(--text-muted);
      margin-top: 6px;
    }

    .form-group {
      margin-bottom: 18px;
    }

    .form-group label {
      display: block;
      font-size: 14px;
      font-weight: 600;
      color: var(--text-main);
      margin-bottom: 8px;
    }

    .form-group input {
      width: 100%;
      padding: 14px 16px;
      font-size: 15px;
      background: var(--input-bg);
      border: 1.5px solid var(--border-color);
      border-radius: 14px;
      color: var(--text-main);
      outline: none;
      transition: all 0.2s ease;
    }

    .form-group input:focus {
      border-color: var(--primary);
      background: #FFFFFF;
      box-shadow: 0 0 0 4px rgba(242, 92, 5, 0.12);
    }

    .form-group input::placeholder {
      color: #B5A69C;
    }

    .btn-cook {
      width: 100%;
      padding: 16px;
      font-size: 17px;
      font-weight: 700;
      color: #FFFFFF;
      background: linear-gradient(135deg, var(--primary) 0%, var(--primary-hover) 100%);
      border: none;
      border-radius: 16px;
      cursor: pointer;
      box-shadow: 0 8px 20px rgba(242, 92, 5, 0.25);
      transition: all 0.2s ease;
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 10px;
      margin-top: 10px;
    }

    .btn-cook:hover:not(:disabled) {
      transform: translateY(-2px);
      box-shadow: 0 12px 24px rgba(242, 92, 5, 0.35);
    }

    .btn-cook:active:not(:disabled) {
      transform: translateY(0);
    }

    .btn-cook:disabled {
      opacity: 0.75;
      cursor: not-allowed;
      transform: none;
    }

    .spinner {
      width: 20px;
      height: 20px;
      border: 3px solid rgba(255, 255, 255, 0.3);
      border-radius: 50%;
      border-top-color: #FFFFFF;
      animation: spin 0.8s linear infinite;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    /* Error Banner */
    .error-card {
      display: none;
      margin-top: 24px;
      padding: 16px;
      background: #FFF0F0;
      border: 1px solid #FFCACA;
      border-radius: 14px;
      color: #D32F2F;
      font-size: 14px;
      line-height: 1.5;
      text-align: center;
      animation: fadeIn 0.3s ease;
    }

    /* Recipe Output Card */
    .recipe-card {
      display: none;
      margin-top: 28px;
      padding: 24px;
      background: #FFFDF9;
      border: 1.5px solid #FFE4CC;
      border-radius: 18px;
      animation: fadeInUp 0.4s cubic-bezier(0.16, 1, 0.3, 1);
    }

    .recipe-card-header {
      border-bottom: 2px dashed #FFE0C2;
      padding-bottom: 16px;
      margin-bottom: 20px;
      text-align: center;
    }

    .recipe-badge {
      display: inline-block;
      font-size: 11px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 1px;
      color: var(--primary);
      background: var(--secondary-soft);
      padding: 4px 12px;
      border-radius: 20px;
      margin-bottom: 8px;
    }

    .dish-title {
      font-family: 'Playfair Display', Georgia, serif;
      font-size: 24px;
      font-weight: 700;
      color: var(--text-main);
      line-height: 1.3;
    }

    .steps-list {
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    .step-item {
      display: flex;
      align-items: flex-start;
      gap: 14px;
      background: #FFFFFF;
      padding: 14px 16px;
      border-radius: 14px;
      border: 1px solid #F7EFE8;
      box-shadow: 0 2px 6px rgba(0, 0, 0, 0.02);
    }

    .step-number {
      flex-shrink: 0;
      width: 28px;
      height: 28px;
      background: var(--primary);
      color: #FFFFFF;
      font-weight: 700;
      font-size: 14px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .step-text {
      font-size: 14.5px;
      color: var(--text-main);
      line-height: 1.5;
      padding-top: 2px;
    }

    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }

    @keyframes fadeInUp {
      from {
        opacity: 0;
        transform: translateY(16px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    @media (max-width: 480px) {
      .app-card {
        padding: 28px 20px;
      }
      .header h1 {
        font-size: 28px;
      }
      .dish-title {
        font-size: 21px;
      }
    }
  </style>
</head>
<body>

  <main class="app-card">
    <header class="header">
      <div class="header-badge">🍳</div>
      <h1>Fridge Hero</h1>
      <p>Enter 3 ingredients to cook up AI culinary magic!</p>
    </header>

    <form id="recipe-form">
      <div class="form-group">
        <label for="ing1">Ingredient 1</label>
        <input type="text" id="ing1" placeholder="e.g. eggs" required autocomplete="off">
      </div>

      <div class="form-group">
        <label for="ing2">Ingredient 2</label>
        <input type="text" id="ing2" placeholder="e.g. bread" required autocomplete="off">
      </div>

      <div class="form-group">
        <label for="ing3">Ingredient 3</label>
        <input type="text" id="ing3" placeholder="e.g. peanut butter" required autocomplete="off">
      </div>

      <button type="submit" id="cook-btn" class="btn-cook">
        <span id="btn-text">Cook Magic ✨</span>
        <span id="btn-spinner" class="spinner" style="display: none;"></span>
      </button>
    </form>

    <div id="error-card" class="error-card"></div>

    <section id="recipe-card" class="recipe-card">
      <div class="recipe-card-header">
        <span class="recipe-badge">Chef's Suggestion</span>
        <h2 id="dish-name" class="dish-title"></h2>
      </div>
      <div class="steps-list">
        <div class="step-item">
          <div class="step-number">1</div>
          <div id="step-1" class="step-text"></div>
        </div>
        <div class="step-item">
          <div class="step-number">2</div>
          <div id="step-2" class="step-text"></div>
        </div>
        <div class="step-item">
          <div class="step-number">3</div>
          <div id="step-3" class="step-text"></div>
        </div>
      </div>
    </section>
  </main>

  <script>
    // Store API key here
    const GEMINI_API_KEY = 'YOUR_GEMINI_API_KEY';

    const recipeForm = document.getElementById('recipe-form');
    const cookBtn = document.getElementById('cook-btn');
    const btnText = document.getElementById('btn-text');
    const btnSpinner = document.getElementById('btn-spinner');
    const errorCard = document.getElementById('error-card');
    const recipeCard = document.getElementById('recipe-card');
    const dishNameEl = document.getElementById('dish-name');
    const step1El = document.getElementById('step-1');
    const step2El = document.getElementById('step-2');
    const step3El = document.getElementById('step-3');

    recipeForm.addEventListener('submit', async (e) => {
      e.preventDefault();

      const ing1 = document.getElementById('ing1').value.trim();
      const ing2 = document.getElementById('ing2').value.trim();
      const ing3 = document.getElementById('ing3').value.trim();

      if (!ing1 || !ing2 || !ing3) {
        showError('Please fill in all 3 ingredients.');
        return;
      }

      if (!GEMINI_API_KEY) {
        showError('🔑 API Key Missing: Please set your Gemini API key in the source code in <code>const GEMINI_API_KEY = \'...\'</code>.');
        return;
      }

      hideError();
      recipeCard.style.display = 'none';
      setLoading(true);

      const prompt = `I have these 3 ingredients: ${ing1}, ${ing2}, ${ing3}. Suggest one creative fancy dish name and give me exactly 3 simple cooking steps. Format: Dish Name: ... Step 1: ... Step 2: ... Step 3: ...`;

      const candidateModels = ['gemini-2.0-flash', 'gemini-2.5-flash', 'gemini-1.5-flash-latest', 'gemini-flash', 'gemini-1.5-pro'];
      let candidateText = null;
      let lastErrorMsg = '';

      for (const model of candidateModels) {
        try {
          const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/${model}:generateContent?key=${GEMINI_API_KEY}`, {
            method: 'POST',
            headers: {
              'Content-Type': 'application/json'
            },
            body: JSON.stringify({
              contents: [
                {
                  parts: [
                    { text: prompt }
                  ]
                }
              ]
            })
          });

          if (response.ok) {
            const data = await response.json();
            candidateText = data.candidates?.[0]?.content?.parts?.[0]?.text;
            if (candidateText) break; // Success! Break out of loop
          } else {
            const errData = await response.json().catch(() => ({}));
            lastErrorMsg = errData.error?.message || `Status ${response.status}`;
            // If it's a 404/model not found, loop will try next model
          }
        } catch (err) {
          lastErrorMsg = err.message;
        }
      }

      try {
        if (!candidateText) {
          throw new Error(lastErrorMsg || 'Unable to connect to Gemini API models.');
        }

        parseAndDisplayRecipe(candidateText);

      } catch (err) {
        console.error('Gemini API Error:', err);
        showError(`Oops! ${err.message || 'Something went wrong while cooking up your recipe. Please check your network or API key.'}`);
      } finally {
        setLoading(false);
      }
    });

    function setLoading(isLoading) {
      if (isLoading) {
        cookBtn.disabled = true;
        btnText.textContent = 'Cooking...';
        btnSpinner.style.display = 'inline-block';
      } else {
        cookBtn.disabled = false;
        btnText.textContent = 'Cook Magic ✨';
        btnSpinner.style.display = 'none';
      }
    }

    function showError(msg) {
      errorCard.innerHTML = msg;
      errorCard.style.display = 'block';
    }

    function hideError() {
      errorCard.style.display = 'none';
      errorCard.innerHTML = '';
    }

    function parseAndDisplayRecipe(text) {
      // Clean markdown formatting if present
      const cleanText = text.replace(/\*\*/g, '');

      let dishName = 'Fancy Culinary Creation';
      let step1 = 'Prepare ingredients with care.';
      let step2 = 'Combine and cook over medium heat.';
      let step3 = 'Serve fresh and enjoy!';

      // Extract Dish Name
      const dishMatch = cleanText.match(/Dish Name:\s*([^\n]+)/i);
      if (dishMatch && dishMatch[1]) {
        dishName = dishMatch[1].trim();
      }

      // Extract Steps
      const step1Match = cleanText.match(/Step 1:\s*([\s\S]*?)(?=Step 2:|$)/i);
      const step2Match = cleanText.match(/Step 2:\s*([\s\S]*?)(?=Step 3:|$)/i);
      const step3Match = cleanText.match(/Step 3:\s*([\s\S]*?)$/i);

      if (step1Match && step1Match[1]) step1 = step1Match[1].trim();
      if (step2Match && step2Match[1]) step2 = step2Match[1].trim();
      if (step3Match && step3Match[1]) step3 = step3Match[1].trim();

      dishNameEl.textContent = dishName;
      step1El.textContent = step1;
      step2El.textContent = step2;
      step3El.textContent = step3;

      recipeCard.style.display = 'block';
      recipeCard.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
    }
  </script>
</body>
</html>
